<a class="post-card" href="{{ include.post.url | relative_url }}">
  <div class="post-thumb">
    {% if include.post.thumbnail %}
      <img src="{{ include.post.thumbnail | relative_url }}" alt="{{ include.post.title }}">
    {% else %}
      <img src="{{ '/assets/images/placeholder-watch.jpg' | relative_url }}" alt="{{ include.post.title }}">
    {% endif %}
  </div>

  <div class="post-card-content">
    <span class="post-category">{{ include.post.category_label | default: include.post.categories[0] }}</span>
    <h3>{{ include.post.title }}</h3>
    {% if include.post.description %}
      <p>{{ include.post.description }}</p>
    {% endif %}
  </div>
</a>
